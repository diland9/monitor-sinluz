<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Cortes de Luz - SEC Chile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  html,body{height:100%;margin:0}
  #map{height:100%;width:100%;background:#020617}
  .glass{background:rgba(15,23,42,0.55);backdrop-filter:blur(10px)}
  .neon{border:1px solid #06b6d4;box-shadow:0 0 10px #06b6d4}
  .leaflet-popup-content-wrapper{background:transparent;box-shadow:none;padding:0}
  .leaflet-popup-content{margin:0}
  .leaflet-popup-tip{background:#0e7490}
  .leaflet-container{background:#020617}
  @keyframes pulso{0%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}100%{opacity:1;transform:scale(1)}}
  .alerta{animation:pulso 1.4s infinite}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#164e63;border-radius:3px}
</style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">
<div class="flex h-screen w-full">

  <aside class="w-1/4 h-full glass neon m-2 rounded-xl p-4 flex flex-col gap-3 overflow-y-auto">
    <div>
      <h1 class="text-cyan-300 text-lg font-medium">Monitor de Cortes de luz</h1>
      <p class="text-slate-500 text-xs">SEC Chile - Aprende con Diland</p>
      <div class="flex items-center gap-2 mt-2 bg-slate-950/60 border border-red-500/40 rounded-lg px-2 py-1.5">
        <span class="inline-block rounded-full bg-red-500 alerta" style="width:10px;height:10px"></span>
        <div class="text-xs leading-tight">
          <span class="text-slate-400">Hora de actualizacion</span><br>
          <span id="ts" class="text-red-300 font-medium"></span>
        </div>
      </div>
    </div>

    <div class="bg-slate-950/70 border border-cyan-700 rounded-xl p-3">
      <p class="text-slate-400 text-xs">Total clientes sin suministro</p>
      <p id="total" class="text-white text-3xl font-medium">-</p>
      <p id="pct" class="text-cyan-400 text-sm">-</p>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-slate-400 text-xs">Filtrar por region</label>
      <select id="fReg" class="bg-slate-950/60 border border-slate-600 rounded-md px-2 py-1.5 text-sm text-slate-200"></select>
      <label class="text-slate-400 text-xs mt-1">Filtrar por comuna</label>
      <select id="fCom" class="bg-slate-950/60 border border-slate-600 rounded-md px-2 py-1.5 text-sm text-slate-200"></select>
    </div>

    <div class="border-t border-slate-800 pt-2 flex-1 min-h-0 flex flex-col">
      <p class="text-cyan-300 text-xs font-medium mb-2">10 comunas mas afectadas</p>
      <div id="top10" class="flex flex-col gap-1.5 overflow-y-auto text-xs"></div>
    </div>
  </aside>

  <main class="w-3/4 h-full flex flex-col gap-2 p-2">
    <div class="h-40 glass neon rounded-xl p-2 flex flex-col">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-cyan-300 text-xs font-medium">Evolucion nacional - clientes sin suministro</span>
        <div class="ml-auto flex gap-1">
          <button data-h="24" class="rb text-[10px] px-2 py-0.5 rounded border border-slate-600 text-cyan-300">24h</button>
          <button data-h="48" class="rb text-[10px] px-2 py-0.5 rounded border border-slate-600 text-cyan-300">48h</button>
          <button data-h="72" class="rb text-[10px] px-2 py-0.5 rounded border border-slate-600 text-cyan-300">72h</button>
          <button data-h="0" class="rb text-[10px] px-2 py-0.5 rounded border border-cyan-400 bg-cyan-500 text-slate-900">7 dias</button>
        </div>
      </div>
      <div class="flex-1 min-h-0"><canvas id="evo"></canvas></div>
    </div>

    <div class="flex-1 relative rounded-xl overflow-hidden neon">
      <div id="map"></div>
      <div class="absolute bottom-3 right-3 z-[1000] bg-slate-950/85 border border-slate-600 rounded-lg p-2 text-[10px]">
        <p class="text-slate-400 mb-1">Clientes sin suministro por comuna</p>
        <div id="leyenda" class="flex flex-col gap-0.5"></div>
      </div>
    </div>
  </main>
</div>
